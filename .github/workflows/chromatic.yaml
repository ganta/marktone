name: Chromatic

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Run Chromatic
        uses: chromaui/action@649b4fd73c3f7cd7a65bd0b9f131349335ec661b # v11.28.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
